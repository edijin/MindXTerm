name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get-version
        shell: powershell
        run: |
          $version = (node -p "require('./package.json').version")
          Write-Host "Version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Windows packages (installer + portable)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build artifacts
        shell: powershell
        run: |
          if (Test-Path "release") {
            Get-ChildItem -Path "release" -Filter "*.exe" | ForEach-Object {
              Write-Host "Found: $($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)"
            }
            $exeCount = (Get-ChildItem -Path "release" -Filter "*.exe").Count
            if ($exeCount -lt 2) {
              Write-Error "Expected at least 2 exe files (installer + portable), found $exeCount"
              exit 1
            }
          } else {
            Write-Error "release directory not found!"
            exit 1
          }

      - name: Create versioned zip archive
        shell: powershell
        run: |
          $version = "${{ steps.get-version.outputs.version }}"
          $zipName = "SmartTerminal-v${version}-Windows.zip"
          Compress-Archive -Path "release\*.exe" -DestinationPath "release\${zipName}"
          Write-Host "Created: ${zipName}"
          Get-ChildItem -Path "release\${zipName}" | ForEach-Object {
            Write-Host "Zip size: $([math]::Round($_.Length / 1MB, 2)) MB"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartTerminal-v${{ steps.get-version.outputs.version }}-Windows
          path: |
            release/*.exe
            release/*.zip
          retention-days: 30

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: SmartTerminal-v${{ needs.build.outputs.version }}-Windows
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.zip
            release/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
